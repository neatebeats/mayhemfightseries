backend:
  name: git-gateway
  branch: main

site_url: https://mayhemfightseriesv2.netlify.app
display_url: https://mayhemfightseriesv2.netlify.app

media_folder: "uploads"
public_folder: "/uploads"

collections:

  - name: "events"
    label: "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["upcoming", "past"], default: "upcoming" }
      - { label: "Event Date", name: "date", widget: "datetime" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "Doors Open", name: "doors", widget: "string", required: false }
      - { label: "Main Event", name: "main_event", widget: "string", required: false }
      - { label: "Event Poster", name: "poster", widget: "image", required: false }
      - { label: "Ticket URL", name: "ticket_url", widget: "string", required: false }
      - label: "Fight Card"
        name: "fight_card"
        widget: "list"
        required: false
        fields:
          - { label: "Bout Type", name: "bout_type", widget: "select", options: ["Main Event", "Co-Main Event", "Main Card", "Undercard", "Prelim"] }
          - { label: "Sport", name: "sport", widget: "select", options: ["Muay Thai", "K1", "Boxing"] }
          - { label: "Weight Class", name: "weight_class", widget: "string" }
          - { label: "Fighter A Name", name: "fighter_a_name", widget: "string" }
          - { label: "Fighter A Gym", name: "fighter_a_gym", widget: "string" }
          - { label: "Fighter A Record", name: "fighter_a_record", widget: "string", required: false }
          - { label: "Fighter B Name", name: "fighter_b_name", widget: "string" }
          - { label: "Fighter B Gym", name: "fighter_b_gym", widget: "string" }
          - { label: "Fighter B Record", name: "fighter_b_record", widget: "string", required: false }

  - name: "fighters"
    label: "Fighters"
    label_singular: "Fighter"
    folder: "content/fighters"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Fighter Name", name: "title", widget: "string" }
      - { label: "Nickname", name: "nickname", widget: "string", required: false }
      - { label: "Fighter Photo", name: "photo", widget: "image", required: false }
      - { label: "Sport", name: "sport", widget: "select", options: ["Muay Thai", "K1", "Boxing"] }
      - { label: "Gender", name: "gender", widget: "select", options: ["Male", "Female"] }
      - { label: "Weight Class", name: "weight_class", widget: "string" }
      - { label: "Record", name: "record", widget: "string", required: false }
      - { label: "Gym", name: "gym", widget: "string" }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Bio", name: "body", widget: "markdown", required: false }

  - name: "results"
    label: "Event Results"
    label_singular: "Result"
    folder: "content/results"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Event Name", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Venue", name: "venue", widget: "string" }
      - label: "Bout Results"
        name: "bouts"
        widget: "list"
        required: false
        fields:
          - { label: "Bout Type", name: "bout_type", widget: "select", options: ["Main Event", "Co-Main Event", "Main Card", "Undercard", "Prelim"] }
          - { label: "Winner", name: "winner", widget: "string" }
          - { label: "Loser", name: "loser", widget: "string" }
          - { label: "Method", name: "method", widget: "select", options: ["KO", "TKO", "Decision (Unanimous)", "Decision (Split)", "Decision (Majority)", "No Contest", "Draw"] }
          - { label: "Round", name: "round", widget: "string", required: false }
          - { label: "Time", name: "time", widget: "string", required: false }
          - { label: "Sport", name: "sport", widget: "select", options: ["Muay Thai", "K1", "Boxing"] }
          - { label: "Weight Class", name: "weight_class", widget: "string" }

  - name: "notices"
    label: "Community Notices"
    label_singular: "Notice"
    folder: "content/notices"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["Event Announcement", "Fighter Announcement", "Sponsorship", "Media", "Community Update", "Fighter Recruitment"] }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Pinned", name: "pinned", widget: "boolean", default: false }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "sponsors"
    label: "Sponsors"
    label_singular: "Sponsor"
    folder: "content/sponsors"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Business Name", name: "title", widget: "string" }
      - { label: "Logo", name: "logo", widget: "image", required: false }
      - { label: "Website URL", name: "url", widget: "string", required: false }
      - { label: "Tier", name: "tier", widget: "select", options: ["Title Sponsor", "Major Sponsor", "Event Sponsor", "Fighter Sponsor", "Supporting Sponsor"] }
      - { label: "Active", name: "active", widget: "boolean", default: true }

  - name: "gallery"
    label: "Gallery Albums"
    label_singular: "Album"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Album Name", name: "title", widget: "string" }
      - { label: "Event", name: "event", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Cover Photo", name: "cover", widget: "image", required: false }
      - label: "Photos"
        name: "photos"
        widget: "list"
        required: false
        fields:
          - { label: "Photo", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
